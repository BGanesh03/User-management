<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | User System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Premium custom styling -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 dark-theme">

    <div class="glass-card shadow-lg p-5 rounded-4 auth-container wide-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="neon-text mb-0">Your Profile</h2>
            <button id="logoutBtn" class="btn btn-outline-danger rounded-pill fw-semibold btn-sm px-3">Logout</button>
        </div>
        
        <div id="alertBox" class="alert d-none"></div>

        <form id="profileForm">
            <div class="row">
                <div class="col-md-6 mb-3 input-group-custom">
                    <label for="email" class="form-label">Email address (Read Only)</label>
                    <input type="email" class="form-control premium-input text-muted" id="email" disabled>
                </div>
                <div class="col-md-6 mb-3 input-group-custom">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control premium-input" id="name" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3 input-group-custom">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control premium-input" id="age" placeholder="25">
                </div>
                <div class="col-md-4 mb-3 input-group-custom">
                    <label for="dob" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control premium-input" id="dob">
                </div>
                <div class="col-md-4 mb-3 input-group-custom">
                    <label for="contact" class="form-label">Contact Number</label>
                    <input type="text" class="form-control premium-input" id="contact" placeholder="+1 234 567 8900">
                </div>
            </div>

            <button type="button" id="updateProfileBtn" class="btn btn-primary w-100 gradient-btn rounded-pill glow-effect py-2 mt-3 fw-semibold">Save Changes</button>
        </form>
    </div>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
